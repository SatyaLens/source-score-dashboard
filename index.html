<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live API Data</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        .status { color: #666; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Users from API</h1>
    <p class="status">Last updated: <span id="timestamp">never</span></p>
    <table id="data-table">
        <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>City</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_URL_BASE = 'https://source-score.onrender.com/api/v1/sources';
        const API_HEADERS = { 'X-API-Key': 'demo-api-key' };
        const REFRESH_MS = 5000;

        async function fetchData() {
            try {
                const res = await fetch(API_URL_BASE, { headers: API_HEADERS });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const sources = await res.json();
                renderTable(sources);
                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
            } catch (err) {
                console.error('Fetch failed:', err);
                document.getElementById('timestamp').textContent = 'Error: ' + err.message;
            }
        }

        function renderTable(sources) {
            const tbody = document.querySelector('#data-table tbody');
            tbody.innerHTML = sources.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.score}</td>
                    <td>${s.uri}</td>
                    <td>${s.tags}</td>
                </tr>
            `).join('');
        }

        fetchData();
        setInterval(fetchData, REFRESH_MS);
    </script>
</body>
</html>
