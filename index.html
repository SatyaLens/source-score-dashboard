<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live API Data</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f4f4f4;
        }

        .status {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Sources</h1>
    <p class="status">Last updated: <span id="timestamp">never</span></p>
    <table id="data-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Score</th>
                <th>URL</th>
                <th>Tags</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_BASE = 'https://source-score.onrender.com/api/v1';
        const API_URL_SOURCES = API_BASE + '/sources';
        const API_HEADERS = { 'X-API-Key': 'demo-api-key' };
        const REFRESH_MS = 5000;

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch] || ch));
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL_SOURCES, { headers: API_HEADERS });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const sources = await res.json();
                await renderTable(sources);
                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
            } catch (err) {
                console.error('Fetch failed:', err);
            }
        }

        async function renderTable(sources) {
            const tbody = document.querySelector('#data-table tbody');
            if (!Array.isArray(sources)) {
                tbody.innerHTML = '<tr><td colspan="4">No sources</td></tr>';
                return;
            }
            tbody.innerHTML = sources.map(s => {
                const href = 'claims.html?source=' + encodeURIComponent(s.uriDigest);
                const sourceLinkHref = s.uri ? escapeHtml(s.uri) : '';
                return `
                <tr>
                    <td><a class="source-link" data-name="${escapeHtml(s.name)}" href="${href}">${escapeHtml(s.name)}</a></td>
                    <td>${escapeHtml(s.score)}</td>
                    <td>${s.uri ? `<a href="${sourceLinkHref}" target="_blank" rel="noopener noreferrer">${escapeHtml(s.uri)}</a>` : ''}</td>
                    <td>${Array.isArray(s.tags) ? escapeHtml(s.tags.join(', ')) : escapeHtml(s.tags)}</td>
                </tr>
            `}).join('');

            // store selected source name in sessionStorage when a link is clicked
            document.querySelectorAll('.source-link').forEach(a => {
                a.addEventListener('click', (e) => {
                    try {
                        const name = a.dataset.name;
                        sessionStorage.setItem('sourceName', name);
                    } catch (err) { console.log(err) }
                });
            });
        }

        fetchData();
        setInterval(fetchData, REFRESH_MS);
    </script>
</body>

</html>
