<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claims</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f4f4f4;
        }

        .status {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
        }

        pre {
            background: #fafafa;
            padding: 10px;
            border: 1px solid #eee;
            overflow: auto
        }
    </style>
</head>

<body>
    <h1 id="claims-title">Claims</h1>
    <p class="status">Last updated: <span id="timestamp">never</span></p>
    <table id="claims-table">
        <thead>
            <tr>
                <th>Claim</th>
                <th>URL</th>
                <th>Tags</th>
                <th>Checked</th>
                <th>Validity</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <p><button onclick="history.back()">Back</button></p>

    <script>
        const API_BASE = 'https://source-score.onrender.com/api/v1';
        const API_HEADERS = { 'X-API-Key': 'demo-api-key' };
        const REFRESH_MS = 5000;

        function getParam(name) {
            return new URLSearchParams(location.search).get(name);
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch] || ch));
        }

        async function fetchClaims() {
            try {
                let digest = getParam('source');
                const res = await fetch(`${API_BASE}/source/${encodeURIComponent(digest)}/claims`, { headers: API_HEADERS });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const claims = await res.json();

                // determine source display name (prefer query param, then response hints)
                const nameParam = getParam('name');
                let displayName = nameParam || '';
                if (!displayName) {
                    if (claims && claims.sourceName) displayName = claims.sourceName;
                    else if (Array.isArray(claims) && claims.length) {
                        const c0 = claims[0];
                        if (c0) {
                            displayName = c0.sourceName || (c0.source && c0.source.name) || '';
                        }
                    }
                }
                await renderClaims(claims);
                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
            } catch (err) {
                console.error('Fetch failed:', err);
            }
        }

        function getClaimDigest(c) {
            return c && c.uriDigest;
        }

        function renderClaims(claims) {
            const tbody = document.querySelector('#claims-table tbody');
            if (!Array.isArray(claims) || claims.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No claims</td></tr>';
                return;
            }

            const nameParam = getParam('name') || '';

            tbody.innerHTML = claims.map(c => {
                const title = c.title;
                const uri = c.uri || c.claimUri || c.claim_uri || '';
                const digestField = getClaimDigest(c);
                const proofsHref = `proofs.html?claim=${encodeURIComponent(digestField)}${nameParam ? '&name=' + encodeURIComponent(nameParam) : ''}`;
                const urlCell = uri ? `<a href="${escapeHtml(uri)}" target="_blank" rel="noopener noreferrer">${escapeHtml(uri)}</a>` : '';
                const tagsCell = Array.isArray(c.tags) ? escapeHtml(c.tags.join(', ')) : escapeHtml(c.tags);
                const checkedCell = (c.checked === undefined) ? '' : escapeHtml(String(c.checked));
                const validityCell = (c.checked) ? (c.validity === undefined ? '' : escapeHtml(String(c.validity))) : '';

                return `
                <tr>
                    <td><a class="proofs-link" data-title="${escapeHtml(title)}" href="${proofsHref}">${escapeHtml(title)}</a></td>
                    <td>${urlCell}</td>
                    <td>${tagsCell}</td>
                    <td>${checkedCell}</td>
                    <td>${validityCell}</td>
                </tr>
            `;
            }).join('');

            // Persist clicked claim title to sessionStorage so proofs page can use it for the header
            document.querySelectorAll('.proofs-link').forEach(a => {
                a.addEventListener('click', (e) => {
                    try {
                        const name = a.dataset.title;
                        sessionStorage.setItem('claimName', name);
                    } catch (err) { console.log(err) }
                });
            });
        }

        // Set header from sessionStorage if available (session storage used by index page)
        (function setTitleFromSession() {
            try {
                const stored = sessionStorage.getItem('sourceName');
                if (stored) {
                    const titleText = `${stored} - Claims`;
                    const el = document.getElementById('claims-title');
                    if (el) el.textContent = titleText;
                    document.title = titleText;
                }
                sessionStorage.removeItem('sourceName');
            } catch (e) { console.log(e) }
        })();

        fetchClaims();
        setInterval(fetchClaims, REFRESH_MS);
    </script>
</body>

</html>
