<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proofs</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        .status { color: #666; font-size: 0.9em; margin-top: 10px; }
        pre { background:#fafafa; padding:10px; border:1px solid #eee; overflow:auto }
    </style>
</head>
<body>
    <h1>Proofs</h1>
    <p class="status">Claim digest: <span id="claim-display">loading…</span></p>
    <table id="proofs-table">
        <thead>
            <tr><th>Proof</th><th>URI</th><th>Provider</th><th>Details</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <p><button onclick="history.back()">Back</button></p>

    <script>
        const API_BASE = 'https://source-score.onrender.com/api/v1';
        const API_HEADERS = { 'X-API-Key': 'demo-api-key' };

        function getParam(name) { return new URLSearchParams(location.search).get(name); }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch] || ch));
        }

        async function sha256hex(input) {
            const enc = new TextEncoder();
            const data = enc.encode(input || '');
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function fetchProofs() {
            try {
                let digest = getParam('claim');
                if (!digest) {
                    const uri = getParam('uri');
                    if (!uri) throw new Error('Missing claim digest or uri');
                    digest = await sha256hex(uri);
                }
                document.getElementById('claim-display').textContent = digest;

                const res = await fetch(`${API_BASE}/claim/${encodeURIComponent(digest)}/proofs`, { headers: API_HEADERS });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const proofs = await res.json();
                renderProofs(proofs);
            } catch (err) {
                console.error('Fetch failed:', err);
                document.getElementById('claim-display').textContent = 'Error: ' + err.message;
                document.querySelector('#proofs-table tbody').innerHTML = `<tr><td colspan="4">${escapeHtml(err.message)}</td></tr>`;
            }
        }

        function renderProofs(proofs) {
            const tbody = document.querySelector('#proofs-table tbody');
            if (!Array.isArray(proofs) || proofs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No proofs</td></tr>';
                return;
            }
            tbody.innerHTML = proofs.map(p => `
                <tr>
                    <td>${escapeHtml(p.title || p.text || p.description || '')}</td>
                    <td>${escapeHtml(p.uri || p.proofUri || p.resource || '')}</td>
                    <td>${escapeHtml(p.provider || p.prover || p.source || '')}</td>
                    <td><pre>${escapeHtml(JSON.stringify(p, null, 2))}</pre></td>
                </tr>
            `).join('');
        }

        fetchProofs();
    </script>
</body>
</html>
